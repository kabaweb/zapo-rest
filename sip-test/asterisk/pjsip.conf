;
; Asterisk PJSIP configuration for zapo-rest SIP trunk testing.
;
; This creates a SIP endpoint that zapo-rest registers to,
; plus a trunk context for test calls.
;

; ── Transport ─────────────────────────────────────────────────────────────────
[udp-transport]
type = transport
protocol = udp
bind = 0.0.0.0:5060

[tcp-transport]
type = transport
protocol = tcp
bind = 0.0.0.0:5060

; ── Template for zapo-rest instances ──────────────────────────────────────────
[zapo-template](!)
type = endpoint
context = zapo-sip-test
disallow = all
allow = alaw
allow = ulaw
direct_media = no
dtmf_mode = rfc4733
trust_id_inbound = yes
device_state_busy_at = 1
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes
ice_support = no

[zapo-auth-template](!)
type = auth
auth_type = userpass

[zapo-aor-template](!)
type = aor
max_contacts = 5
remove_existing = no
qualify_frequency = 30

; ── zapo-rest endpoint ────────────────────────────────────────────────────────
[zapo-rest]
type = endpoint
context = zapo-sip-test
disallow = all
allow = alaw
allow = ulaw
direct_media = no
dtmf_mode = rfc4733
trust_id_inbound = yes
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes
auth = zapo-auth
aors = zapo-aor
outbound_auth = zapo-auth

[zapo-auth]
type = auth
auth_type = userpass
username = zapo
password = zapo123

[zapo-aor]
type = aor
max_contacts = 5
remove_existing = no
qualify_frequency = 30

; ── Test phone (softphone / SIP client for manual testing) ────────────────────
[test-phone]
type = endpoint
context = zapo-sip-test
disallow = all
allow = alaw
allow = ulaw
direct_media = no
dtmf_mode = rfc4733
trust_id_inbound = yes
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes
auth = test-phone-auth
aors = test-phone-aor

[test-phone-auth]
type = auth
auth_type = userpass
username = test
password = test123

[test-phone-aor]
type = aor
max_contacts = 3
remove_existing = no

; ── DID mapping endpoint (receives calls from SIP trunk) ──────────────────────
[did-endpoint]
type = endpoint
context = did-inbound
disallow = all
allow = alaw
allow = ulaw
direct_media = no
dtmf_mode = rfc4733
rtp_symmetric = yes
force_rport = yes
rewrite_contact = yes
identify_by = auth_username
auth = did-auth
aors = did-aor

[did-auth]
type = auth
auth_type = userpass
username = diduser
password = didpass

[did-aor]
type = aor
max_contacts = 1

; ── Identify DID inbound by IP ────────────────────────────────────────────────
[did-identify]
type = identify
endpoint = did-endpoint
match = 127.0.0.1
