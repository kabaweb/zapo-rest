;
; Asterisk dialplan for zapo-rest SIP trunk testing.
;

; ── Context for zapo-rest endpoints ───────────────────────────────────────────
[zapo-sip-test]

; Echo test: dial 100 to hear yourself (useful for audio quality testing)
exten => 100,1,NoOp(Echo test answered)
 same => n,Answer()
 same => n,Echo()
 same => n,Hangup()

; Music on hold: dial 101 to hear music (confirms audio path works)
exten => 101,1,NoOp(Music test answered)
 same => n,Answer()
 same => n,MusicOnHold(default,30)
 same => n,Hangup()

; Milliwatt tone: dial 102 to hear 1000Hz tone (audio calibration)
exten => 102,1,NoOp(Milliwatt test answered)
 same => n,Answer()
 same => n,Milliwatt()
 same => n,Hangup()

; Conference bridge: dial 200 to join a conference room
; Users registered to test-phone can also join to test bridging
exten => 200,1,NoOp(Conference bridge)
 same => n,Answer()
 same => n,ConfBridge(2000,default_bridge,default_user)
 same => n,Hangup()

; Playback: dial 300 to hear a pre-recorded message
exten => 300,1,NoOp(Playback test)
 same => n,Answer()
 same => n,Playback(hello-world)
 same => n,Hangup()

; Any other extension — just answers and hangs up after 10s
exten => _X.,1,NoOp(Default handler for ${EXTEN})
 same => n,Answer()
 same => n,Wait(5)
 same => n,Playback(vm-goodbye)
 same => n,Hangup()

; ── Context for DID inbound routing ───────────────────────────────────────────
[did-inbound]

; DID 1001 → zapo-rest handles this via SIP INVITE (DID mapping)
; Asterisk just passes the INVITE to the registered zapo-rest endpoint
exten => 1001,1,NoOp(DID 1001 — should be handled by zapo-rest)
 same => n,Dial(PJSIP/zapo-rest,30)
 same => n,Hangup()

exten => 1002,1,NoOp(DID 1002 — should be handled by zapo-rest)
 same => n,Dial(PJSIP/zapo-rest,30)
 same => n,Hangup()

; ── Context for outbound calls to SIP trunk ───────────────────────────────────
[outbound-trunk]

; This context is used when zapo-rest bridges WhatsApp → SIP
; The call enters here and can be routed to test extensions
exten => _X.,1,NoOp(Outbound trunk call to ${EXTEN})
 same => n,Goto(zapo-sip-test,${EXTEN},1)
